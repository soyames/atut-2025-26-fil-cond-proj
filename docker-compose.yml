x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: UTC
    PYTHONPATH: /opt/airflow
    AIRFLOW_UID: 50000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./.env:/opt/airflow/.env
    - ./Books.csv:/opt/airflow/Books.csv
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir pandas requests beautifulsoup4 boto3 python-dotenv &&
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir pandas requests beautifulsoup4 boto3 python-dotenv &&
      airflow webserver --port 8091"
    ports:
      - "${AIRFLOW_HOST_PORT:-8091}:8091"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir pandas requests beautifulsoup4 boto3 python-dotenv &&
      airflow scheduler"
    depends_on:
      - airflow-init

  spark-master:
    image: apache/spark:4.0.2
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8081"
    ports:
      - "7077:7077"
      - "8081:8081"

  spark-worker:
    image: apache/spark:4.0.2
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8082"
    ports:
      - "8082:8082"
    depends_on:
      - spark-master

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb -p local/lakehouse || true;
      /usr/bin/mc anonymous set download local/lakehouse;
      exit 0;
      "

